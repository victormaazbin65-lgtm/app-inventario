<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBX_IY50FSYoP4Q9n0jOiMDL19O7Vwq464",
            authDomain: "sublicosturas-app.firebaseapp.com",
            projectId: "sublicosturas-app",
            storageBucket: "sublicosturas-app.firebasestorage.app",
            messagingSenderId: "672743665524",
            appId: "1:672743665524:web:19af273c8d88b929c18621",
            measurementId: "G-EHE8KQVFEE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.setDoc = setDoc;
        window.doc = doc;
        window.getDoc = getDoc;

        console.log("🔥 Firebase SubliCosturas Conectado");
        
        // Ejecutar carga inicial desde la nube
        window.cargarDesdeNube();
    </script>

    <script>
        const KEY_INV = 'subli_inv_v10';
        const KEY_VENTAS = 'subli_vent_v10';
        const KEY_FONDOS = 'subli_fondos_v10';
        const KEY_INGRESOS = 'subli_ingresos_v10';

        let inventario = [];
        let ventas = [];
        let historialIngresos = [];
        let fondos = { costoProducto: 0, costoLuzTinta: 0, gananciaLibre: 0 };
        
        let carritoIngresos = [];
        let carritoVentas = [];

        // NUEVA FUNCIÓN: Trae los datos de la nube al celular automáticamente
        async function cargarDesdeNube() {
            if(!window.db) return;
            try {
                const docRef = doc(window.db, "sistema", "datos_actuales");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    inventario = data.inventario || [];
                    ventas = data.ventas || [];
                    fondos = data.fondos || { costoProducto: 0, costoLuzTinta: 0, gananciaLibre: 0 };
                    historialIngresos = data.historialIngresos || [];
                    
                    // Guardar localmente para acceso rápido
                    localStorage.setItem(KEY_INV, JSON.stringify(inventario));
                    localStorage.setItem(KEY_VENTAS, JSON.stringify(ventas));
                    localStorage.setItem(KEY_FONDOS, JSON.stringify(fondos));
                    localStorage.setItem(KEY_INGRESOS, JSON.stringify(historialIngresos));
                    
                    actualizarUI();
                    console.log("☁️ Datos de SubliCosturas sincronizados desde la nube");
                }
            } catch (e) {
                console.error("Error al cargar de la nube:", e);
            }
        }
        window.cargarDesdeNube = cargarDesdeNube;

        function cargarDatos() {
            try {
                const dataInv = localStorage.getItem(KEY_INV);
                if (dataInv) inventario = JSON.parse(dataInv) || [];
                const dataVent = localStorage.getItem(KEY_VENTAS);
                if (dataVent) ventas = JSON.parse(dataVent) || [];
                const dataFondos = localStorage.getItem(KEY_FONDOS);
                if (dataFondos) fondos = JSON.parse(dataFondos) || { costoProducto: 0, costoLuzTinta: 0, gananciaLibre: 0 };
                const dataIngresos = localStorage.getItem(KEY_INGRESOS);
                if (dataIngresos) historialIngresos = JSON.parse(dataIngresos) || [];
            } catch (e) { 
                console.log("Iniciando datos vacíos");
            }
            mostrarLogo();
            actualizarUI();
        }

        function cambiarPestaña(pestaña) {
            ['inicio', 'ingreso', 'inventario', 'ventas'].forEach(p => {
                document.getElementById('sec-' + p).style.display = 'none';
                document.getElementById('tab-' + p).classList.remove('active');
            });
            document.getElementById('sec-' + pestaña).style.display = 'block';
            document.getElementById('tab-' + pestaña).classList.add('active');
            if(pestaña === 'inicio') actualizarUI(); 
            if(pestaña === 'ingreso') { renderSelectIngreso(); renderHistorialIngresos(); }
            if(pestaña === 'ventas') renderSelectVentas();
        }

        function cargarLogo(event) {
            const file = event.target.files[0];
            if(file){
                const reader = new FileReader();
                reader.onload = function(e){
                    localStorage.setItem('subli_logo', e.target.result);
                    mostrarLogo();
                };
                reader.readAsDataURL(file);
            }
        }
        function mostrarLogo() {
            const logo = localStorage.getItem('subli_logo');
            if(logo){
                document.getElementById('logo-img').src = logo;
                document.getElementById('logo-img').style.display = 'block';
                document.getElementById('btn-edit-logo').style.display = 'flex';
                document.getElementById('logo-upload-wrapper').style.display = 'none';
            } else {
                document.getElementById('logo-img').style.display = 'none';
                document.getElementById('btn-edit-logo').style.display = 'none';
                document.getElementById('logo-upload-wrapper').style.display = 'inline-block';
            }
        }

        function toggleNuevoProducto() {
            const val = document.getElementById('inv-select').value;
            document.getElementById('grupo-nombre-producto').style.display = val === 'nuevo' ? 'block' : 'none';
        }

        function renderSelectIngreso() {
            const select = document.getElementById('inv-select');
            select.innerHTML = '<option value="nuevo">➕ Crear un Producto Nuevo</option>';
            inventario.forEach(p => { select.innerHTML += `<option value="${p.id}">Añadir stock a: ${p.nombre}</option>`; });
        }

        function agregarAlCarritoIngreso() {
            const selectId = document.getElementById('inv-select').value;
            const stock = parseInt(document.getElementById('inv-stock').value);
            const costoBase = parseFloat(document.getElementById('inv-costo').value);
            const proveedor = document.getElementById('inv-proveedor').value.trim() || 'No especificado';
            if (isNaN(stock) || isNaN(costoBase) || stock <= 0) { alert("⚠️ Cantidad y Costo deben ser mayores a cero."); return; }
            let nombreProd = "";
            if (selectId === 'nuevo') {
                nombreProd = document.getElementById('inv-nombre').value.trim();
                if(!nombreProd) { alert("⚠️ Escribe un nombre para el nuevo producto."); return; }
            } else {
                const prod = inventario.find(p => p.id == selectId);
                nombreProd = prod ? prod.nombre : "Producto";
            }
            carritoIngresos.push({ tempId: Date.now(), isNew: selectId === 'nuevo', idOriginal: selectId !== 'nuevo' ? selectId : null, nombre: nombreProd, stock: stock, costoBase: costoBase, proveedor: proveedor });
            document.getElementById('inv-stock').value = '';
            document.getElementById('inv-costo').value = '';
            document.getElementById('inv-nombre').value = '';
            renderCarritoIngresos();
        }

        function borrarDelCarritoIngreso(tempId) {
            carritoIngresos = carritoIngresos.filter(item => item.tempId !== tempId);
            renderCarritoIngresos();
        }

        function renderCarritoIngresos() {
            const contenedor = document.getElementById('lista-ingresos-pendientes');
            if (carritoIngresos.length === 0) { contenedor.innerHTML = '<p class="item-details" style="text-align:center;">Lista vacía.</p>'; return; }
            contenedor.innerHTML = '';
            carritoIngresos.forEach(item => {
                contenedor.innerHTML += `<div class="item-row"><div class="item-info"><p class="item-title">${item.isNew ? '✨ Nuevo:' : '📦'} ${item.nombre}</p><p class="item-details">+${item.stock} piezas | Costo Base: Q${item.costoBase.toFixed(2)} c/u</p></div><button onclick="borrarDelCarritoIngreso(${item.tempId})" class="btn-sm btn-delete">X</button></div>`;
            });
        }

        function procesarIngresoMultiple() {
            if(carritoIngresos.length === 0) { alert("⚠️ No hay productos en la lista."); return; }
            const transporteGlobal = parseFloat(document.getElementById('ingreso-transporte-global').value) || 0;
            const totalPiezas = carritoIngresos.reduce((acc, item) => acc + item.stock, 0);
            const transportePorPieza = totalPiezas > 0 ? (transporteGlobal / totalPiezas) : 0;
            let registroHistorial = { id: Date.now(), fecha: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), items: [] };
            carritoIngresos.forEach(item => {
                const costoFinal = item.costoBase + transportePorPieza;
                let idFinalAsignado;
                if(item.isNew) {
                    idFinalAsignado = Date.now() + Math.random();
                    inventario.push({ id: idFinalAsignado, nombre: item.nombre, stock: item.stock, min: 5, costo: costoFinal, proveedor: item.proveedor });
                } else {
                    idFinalAsignado = item.idOriginal;
                    const p = inventario.find(x => x.id == idFinalAsignado);
                    if(p) {
                        const valorViejo = p.stock * p.costo;
                        const valorNuevo = item.stock * costoFinal;
                        p.stock += item.stock;
                        p.costo = (valorViejo + valorNuevo) / p.stock;
                        if(item.proveedor !== "No especificado") p.proveedor = item.proveedor;
                    }
                }
                registroHistorial.items.push({ idFinal: idFinalAsignado, nombre: item.nombre, stock: item.stock });
            });
            historialIngresos.push(registroHistorial);
            carritoIngresos = [];
            document.getElementById('ingreso-transporte-global').value = '';
            guardarDatos(); actualizarUI(); renderCarritoIngresos(); renderHistorialIngresos();
            alert(`✅ ¡Guardado! Se agregaron a tu inventario.`);
        }

        function renderHistorialIngresos() {
            const cont = document.getElementById('lista-historial-ingresos');
            cont.innerHTML = '';
            if(historialIngresos.length === 0) { cont.innerHTML = '<p class="item-details" style="text-align:center;">No hay ingresos recientes.</p>'; return; }
            [...historialIngresos].reverse().forEach(reg => {
                const resumen = reg.items.map(i => `+${i.stock}x ${i.nombre}`).join(', ');
                cont.innerHTML += `<div class="item-row"><div class="item-info"><p class="item-title">${reg.fecha}</p><p class="item-details">${resumen}</p></div><div class="item-actions"><button onclick="borrarIngreso(${reg.id})" class="btn-sm btn-delete">Anular y Restar</button></div></div>`;
            });
        }

        function borrarIngreso(id) {
            if(!confirm("¿Anular este ingreso? Se restará la cantidad del inventario.")) return;
            const reg = historialIngresos.find(x => x.id === id);
            if(reg) {
                reg.items.forEach(item => { let p = inventario.find(inv => inv.id === item.idFinal); if(p) p.stock -= item.stock; });
                historialIngresos = historialIngresos.filter(x => x.id !== id);
                guardarDatos(); actualizarUI(); renderHistorialIngresos();
            }
        }

        function abrirModalEditar(id) {
            const prod = inventario.find(p => p.id === id);
            if(!prod) return;
            document.getElementById('edit-id').value = prod.id;
            document.getElementById('edit-nombre').value = prod.nombre;
            document.getElementById('edit-stock').value = prod.stock;
            document.getElementById('edit-costo').value = prod.costo.toFixed(2);
            document.getElementById('edit-proveedor').value = prod.proveedor || '';
            document.getElementById('modal-editar').style.display = 'flex';
        }
        function cerrarModalEditar() { document.getElementById('modal-editar').style.display = 'none'; }
        function guardarEdicionInventario() {
            const id = parseFloat(document.getElementById('edit-id').value);
            const nombre = document.getElementById('edit-nombre').value.trim();
            const stock = parseInt(document.getElementById('edit-stock').value);
            const costo = parseFloat(document.getElementById('edit-costo').value);
            const proveedor = document.getElementById('edit-proveedor').value.trim();
            if(!nombre || isNaN(stock) || isNaN(costo)) { alert("Datos inválidos."); return; }
            const p = inventario.find(x => x.id === id);
            if(p) { p.nombre = nombre; p.stock = stock; p.costo = costo; p.proveedor = proveedor; guardarDatos(); actualizarUI(); cerrarModalEditar(); }
        }
        function borrarProducto(id) {
            if(confirm("¿Eliminar definitivamente del inventario?")) { inventario = inventario.filter(p => p.id !== id); guardarDatos(); actualizarUI(); }
        }

        function renderSelectVentas() {
            const select = document.getElementById('venta-producto');
            select.innerHTML = '<option value="">-- Selecciona --</option>';
            inventario.forEach(p => { if(p.stock > 0) select.innerHTML += `<option value="${p.id}">${p.nombre} (Hay ${p.stock})</option>`; });
        }
        function cambiarRolVenta() {
            const rol = document.getElementById('venta-rol').value;
            if(rol === 'material') { document.getElementById('grupo-venta-precio').style.display = 'none'; document.getElementById('venta-precio').value = '0';
            } else { document.getElementById('grupo-venta-precio').style.display = 'block'; document.getElementById('venta-precio').value = ''; }
        }
        function getStockDisponible(idProd) {
            const prod = inventario.find(p => p.id == idProd);
            if(!prod) return 0;
            let qtyEnCarrito = carritoVentas.filter(item => item.idProd == idProd).reduce((sum, item) => sum + item.qty, 0);
            return prod.stock - qtyEnCarrito;
        }
        function agregarAlCarritoVenta() {
            const idProd = document.getElementById('venta-producto').value;
            const rol = document.getElementById('venta-rol').value; 
            const qty = parseInt(document.getElementById('venta-qty').value);
            const precioCobrado = rol === 'principal' ? parseFloat(document.getElementById('venta-precio').value) : 0;
            if(!idProd || isNaN(qty) || qty <= 0 || isNaN(precioCobrado)) { alert("⚠️ Revisa los datos ingresados."); return; }
            const prod = inventario.find(p => p.id == idProd);
            const stockLibre = getStockDisponible(idProd);
            if(stockLibre < qty) { alert(`❌ No puedes agregar ${qty}. Solo te quedan ${stockLibre} disponibles.`); return; }
            carritoVentas.push({ tempId: Date.now(), idProd: prod.id, nombre: prod.nombre, rol: rol, qty: qty, precioCobrado: precioCobrado, costoBase: prod.costo });
            document.getElementById('venta-qty').value = '1';
            if(rol === 'principal') document.getElementById('venta-precio').value = '';
            renderCarritoVentas();
        }
        function borrarDelCarritoVenta(tempId) { carritoVentas = carritoVentas.filter(item => item.tempId !== tempId); renderCarritoVentas(); }
        function renderCarritoVentas() {
            const contenedor = document.getElementById('lista-carrito-ventas');
            let totalCobrar = 0; let totalCostoInterno = 0;
            if (carritoVentas.length === 0) { contenedor.innerHTML = '<p class="item-details" style="text-align:center;">Carrito vacío.</p>';
            } else {
                contenedor.innerHTML = '';
                carritoVentas.forEach(item => {
                    const subtotalCobrado = item.qty * item.precioCobrado;
                    const subtotalCosto = item.qty * item.costoBase;
                    totalCobrar += subtotalCobrado; totalCostoInterno += subtotalCosto;
                    const esPrincipal = item.rol === 'principal';
                    const icon = esPrincipal ? '🏷️' : '✂️';
                    contenedor.innerHTML += `<div class="item-row"><div class="item-info"><p class="item-title" style="color: ${esPrincipal ? '#1f2937' : '#6b7280'}">${icon} ${item.qty}x ${item.nombre}</p><p class="item-details">${esPrincipal ? `Cobrado: Q${item.precioCobrado.toFixed(2)} c/u` : `Material (Q${subtotalCosto.toFixed(2)})`}</p></div><button onclick="borrarDelCarritoVenta(${item.tempId})" class="btn-sm btn-delete">X</button></div>`;
                });
            }
            document.getElementById('venta-total-preview').innerHTML = `<div style="color: var(--primary-green);">Total a Cobrar: Q ${totalCobrar.toFixed(2)}</div><div style="color: var(--primary-red); font-size: 13px; font-weight: normal;">(Costo materiales: Q ${totalCostoInterno.toFixed(2)})</div>`;
        }

        function procesarVentaMultiple() {
            if(carritoVentas.length === 0) { alert("⚠️ El carrito está vacío."); return; }
            const costoTinta = parseFloat(document.getElementById('venta-tinta').value) || 0;
            const costoEnvio = parseFloat(document.getElementById('venta-envio').value) || 0;
            let ingresoTotal = 0; let costosProductos = 0; let itemsResumen = [];
            carritoVentas.forEach(item => {
                const p = inventario.find(x => x.id == item.idProd);
                if(p) p.stock -= item.qty;
                ingresoTotal += (item.qty * item.precioCobrado);
                costosProductos += (item.qty * item.costoBase); 
                itemsResumen.push(`${item.qty}x ${item.nombre}${item.rol === 'material' ? ' (M)' : ''}`);
            });
            const totalCostosOperativos = costosProductos + costoTinta + costoEnvio;
            const gananciaNeta = ingresoTotal - totalCostosOperativos;
            fondos.costoProducto += costosProductos; fondos.costoLuzTinta += costoTinta; fondos.gananciaLibre += gananciaNeta;
            ventas.push({ id: Date.now(), fecha: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), resumenItems: itemsResumen.join(' + '), ingresoTotal: ingresoTotal, costosProductos: costosProductos, costoTinta: costoTinta, costoEnvio: costoEnvio, ganancia: gananciaNeta, detalleItems: [...carritoVentas] });
            carritoVentas = []; document.getElementById('venta-tinta').value = ''; document.getElementById('venta-envio').value = '';
            renderCarritoVentas(); guardarDatos(); actualizarUI();
            alert("💰 ¡Venta procesada con éxito!");
        }

        function borrarVenta(id) {
            const v = ventas.find(x => x.id === id);
            if(!v) return;
            if(confirm("¿Deshacer venta? Los artículos regresarán al inventario.")) {
                v.detalleItems.forEach(item => { const p = inventario.find(x => x.id == item.idProd); if(p) p.stock += item.qty; });
                fondos.costoProducto -= v.costosProductos; fondos.costoLuzTinta -= v.costoTinta; fondos.gananciaLibre -= v.ganancia; 
                ventas = ventas.filter(x => x.id !== id);
                guardarDatos(); actualizarUI();
            }
        }

        function reiniciarCostoProducto() { if(confirm("¿Retirar dinero para surtir?")) { fondos.costoProducto = 0; guardarDatos(); actualizarUI(); } }
        function reiniciarCostoLuzTinta() { if(confirm("¿Retirar dinero para pagos?")) { fondos.costoLuzTinta = 0; guardarDatos(); actualizarUI(); } }
        function reiniciarGanancia() { if(confirm("¿Retirar ganancia?")) { fondos.gananciaLibre = 0; guardarDatos(); actualizarUI(); } }

        function generarReporteExcel() {
            const inv = JSON.parse(localStorage.getItem(KEY_INV)) || [];
            const vent = JSON.parse(localStorage.getItem(KEY_VENTAS)) || [];
            const fnd = JSON.parse(localStorage.getItem(KEY_FONDOS)) || { costoProducto: 0, costoLuzTinta: 0, gananciaLibre: 0 };
            let valorInv = inv.reduce((sum, p) => sum + (p.stock * p.costo), 0);
            const libro = XLSX.utils.book_new();
            const dataResumen = [
                { "Concepto": "Valor Total del Inventario Actual", "Monto (Q)": valorInv.toFixed(2) },
                { "Concepto": "Fondo Acumulado: Productos (Surtir)", "Monto (Q)": fnd.costoProducto.toFixed(2) },
                { "Concepto": "Fondo Acumulado: Luz y Tinta", "Monto (Q)": fnd.costoLuzTinta.toFixed(2) },
                { "Concepto": "Ganancia Libre Acumulada", "Monto (Q)": fnd.gananciaLibre.toFixed(2) }
            ];
            const hojaResumen = XLSX.utils.json_to_sheet(dataResumen);
            XLSX.utils.book_append_sheet(libro, hojaResumen, "Resumen Financiero");
            if (inv.length > 0) {
                const dataInv = inv.map(p => ({ "Nombre del Producto": p.nombre, "Existencias (Stock)": p.stock, "Costo Unitario (Q)": p.costo.toFixed(2), "Proveedor": p.proveedor || "No especificado", "Valor en Bodega (Q)": (p.stock * p.costo).toFixed(2) }));
                const hojaInv = XLSX.utils.json_to_sheet(dataInv);
                XLSX.utils.book_append_sheet(libro, hojaInv, "Inventario");
            }
            if (vent.length > 0) {
                const dataVent = vent.map(v => ({ "Fecha y Hora": v.fecha, "Detalle de Artículos": v.resumenItems, "Total Cobrado (Q)": v.ingresoTotal.toFixed(2), "Costo de Materiales (Q)": v.costosProductos.toFixed(2), "Gasto Tinta/Luz (Q)": v.costoTinta.toFixed(2), "Pago Mensajero (Q)": v.costoEnvio.toFixed(2), "Ganancia Neta (Q)": v.ganancia.toFixed(2) }));
                const hojaVent = XLSX.utils.json_to_sheet(dataVent);
                XLSX.utils.book_append_sheet(libro, hojaVent, "Ventas");
            }
            const fecha = new Date().toLocaleDateString().replace(/\//g, '-');
            XLSX.writeFile(libro, `SubliCosturas_Reporte_Completo_${fecha}.xlsx`);
        }

        async function guardarDatos() {
            localStorage.setItem(KEY_INV, JSON.stringify(inventario));
            localStorage.setItem(KEY_VENTAS, JSON.stringify(ventas));
            localStorage.setItem(KEY_FONDOS, JSON.stringify(fondos));
            localStorage.setItem(KEY_INGRESOS, JSON.stringify(historialIngresos));

            if(window.db) {
                try {
                    await setDoc(doc(window.db, "sistema", "datos_actuales"), {
                        inventario, ventas, fondos, historialIngresos, ultimaActualizacion: new Date()
                    });
                    console.log("☁️ Nube de SubliCosturas actualizada");
                } catch (e) {
                    console.error("Error sincronizando nube:", e);
                }
            }
        }

        function actualizarUI() {
            let valorInventario = inventario.reduce((sum, p) => sum + (p.stock * p.costo), 0);
            document.getElementById('dash-valor-inv').innerText = 'Q ' + valorInventario.toFixed(2);
            document.getElementById('dash-costo-producto').innerText = 'Q ' + fondos.costoProducto.toFixed(2);
            document.getElementById('dash-costo-luz').innerText = 'Q ' + fondos.costoLuzTinta.toFixed(2);
            document.getElementById('dash-ganancia').innerText = 'Q ' + fondos.gananciaLibre.toFixed(2);
            
            const contInv = document.getElementById('lista-inventario'); contInv.innerHTML = '';
            inventario.forEach(p => {
                contInv.innerHTML += `<div class="item-row"><div class="item-info"><p class="item-title">${p.nombre}</p><p class="item-details">Stock: <b>${p.stock}</b> | Costo: Q${p.costo.toFixed(2)}</p></div><div class="item-actions"><button onclick="abrirModalEditar(${p.id})" class="btn-sm btn-edit">Editar</button><button onclick="borrarProducto(${p.id})" class="btn-sm btn-delete">Borrar</button></div></div>`;
            });

            const contVentas = document.getElementById('lista-ventas'); contVentas.innerHTML = '';
            [...ventas].reverse().forEach(v => {
                contVentas.innerHTML += `<div class="item-row"><div class="item-info"><p class="item-title">${v.resumenItems}</p><p class="item-details"><b>Fecha:</b> ${v.fecha}<br><b>Cobrado:</b> Q${v.ingresoTotal.toFixed(2)}<br><span class="profit-text">Ganancia: Q${v.ganancia.toFixed(2)}</span></p></div><div class="item-actions"><button onclick="borrarVenta(${v.id})" class="btn-sm btn-delete">Anular</button></div></div>`;
            });
            renderSelectIngreso(); renderSelectVentas();
        }

        cargarDatos();
    </script>
