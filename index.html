<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubliCosturas - Sistema Pro</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="./logo.jpg">

    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --primary-blue: #2563eb;
            --primary-green: #16a34a;
            --primary-red: #dc2626;
            --primary-purple: #7c3aed;
            --primary-orange: #ea580c;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --border-color: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 850px; padding-bottom: 50px; }

        /* Pestañas */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; background-color: var(--card-bg); color: var(--text-light); box-shadow: var(--shadow); transition: 0.3s; min-width: 120px; }
        .tab-btn.active { background-color: var(--primary-blue); color: white; }

        /* Tarjetas */
        .card { background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
        .section-title { margin-top: 0; border-bottom: 2px solid var(--bg-color); padding-bottom: 10px; color: var(--text-dark); }
        .sub-title { font-size: 15px; color: var(--text-dark); margin-bottom: 10px; margin-top: 20px; border-bottom: 1px dashed var(--border-color); padding-bottom: 5px;}

        /* Logo */
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-wrapper { position: relative; display: inline-block; }
        #logo-img { max-width: 180px; max-height: 180px; border-radius: 15px; object-fit: contain; display: none; }
        .logo-edit-btn { background: white; border: 1px solid #ccc; border-radius: 50%; width: 35px; height: 35px; position: absolute; bottom: -10px; right: -10px; cursor: pointer; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-size: 18px; align-items: center; justify-content: center; padding: 0;}
        .file-input-wrapper { display: inline-block; position: relative; overflow: hidden; }
        .file-input-wrapper input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }
        .btn-upload { background: var(--bg-color); color: var(--text-dark); padding: 8px 15px; border-radius: 8px; font-size: 12px; border: 1px solid var(--border-color); font-weight: bold;}

        /* Dashboard */
        .dash-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .dash-grid { grid-template-columns: 1fr 1fr; } }
        .dash-card { padding: 20px; border-radius: 12px; color: white; text-align: center; box-shadow: var(--shadow); }
        .bg-blue { background-color: var(--primary-blue); }
        .bg-purple { background-color: var(--primary-purple); }
        .bg-orange { background-color: var(--primary-orange); }
        .bg-green { background-color: var(--primary-green); }
        .dash-title { font-size: 13px; text-transform: uppercase; opacity: 0.9; margin: 0 0 5px 0; }
        .dash-value { font-size: 26px; font-weight: bold; margin: 0; }
        .dash-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-top: 15px; width: 100%; font-weight: bold; }
        .dash-btn:hover { background: rgba(255,255,255,0.3); }

        /* Formularios */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; color: var(--text-light); margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; box-sizing: border-box; background-color: #f9fafb; }
        input:focus, select:focus { outline: none; border-color: var(--primary-blue); background-color: white;}

        button.btn-main { width: 100%; padding: 15px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button.btn-main:hover { background-color: #1d4ed8; }
        button.btn-green { background-color: var(--primary-green); }

        /* Listas y Tablas */
        .cart-container { background-color: #f8fafc; border: 1px dashed var(--primary-blue); border-radius: 8px; padding: 15px; margin-top: 15px; }
        .cart-title { font-size: 14px; font-weight: bold; color: var(--primary-blue); margin-top: 0; border-bottom: 1px solid #bfdbfe; padding-bottom: 5px; }
        
        .item-row { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border-color); padding: 12px 0; }
        .item-info { flex: 1; }
        .item-title { font-weight: bold; font-size: 15px; margin: 0 0 5px 0; text-transform: capitalize; }
        .item-details { font-size: 13px; color: var(--text-light); margin: 0; line-height: 1.5; }
        .item-actions { display: flex; gap: 8px; flex-direction: row; flex-wrap: wrap;}

        .btn-sm { padding: 6px 10px; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; text-align: center;}
        .btn-edit { background-color: #fef08a; color: #854d0e; }
        .btn-delete { background-color: #fecaca; color: var(--primary-red); }
        .btn-sell { background-color: #bfdbfe; color: var(--primary-blue); border: 1px solid var(--primary-blue); }
        
        .alert-stock { color: var(--primary-red); font-weight: bold; }
        .profit-text { color: var(--primary-green); font-weight: bold; font-size: 14px; display: block; margin-top: 3px;}
        .cost-text { color: var(--primary-red); font-size: 12px; }
        .cart-total { text-align: right; font-size: 18px; font-weight: bold; color: var(--text-dark); margin-top: 10px; }

        /* MODAL DE EDICIÓN */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;}
        .modal-card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-title { margin-top: 0; color: var(--primary-blue); border-bottom: 2px solid var(--border-color); padding-bottom: 10px;}
        .modal-btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn-row button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #e5e7eb; color: #374151; }

        /* Autocompletado */
        .autocomplete-input { width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; box-sizing: border-box; background-color: #fff; transition: 0.2s;}
        .autocomplete-input:focus { outline: none; border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .sugerencias-box { position: absolute; top: 100%; left: 0; right: 0; background: white; z-index: 100; border: 1px solid var(--border-color); border-radius: 8px; max-height: 200px; overflow-y: auto; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); display: none; margin-top: 5px; }
        .sugerencia-item { padding: 12px 15px; border-bottom: 1px solid #f3f4f6; cursor: pointer; font-size: 14px; color: var(--text-dark); display: flex; justify-content: space-between; align-items: center; transition: 0.2s;}
        .sugerencia-item:hover { background-color: var(--primary-blue); color: white; }
        .sugerencia-item:hover span { color: #e5e7eb !important; }
        .sugerencia-item:last-child { border-bottom: none; }

        /* Botón de Instalación */
        #btn-instalar-app { display: none; background-color: #10b981; color: white; border: none; padding: 15px 20px; font-size: 15px; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.4); animation: latido 2s infinite; }
        @keyframes latido { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="login-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="card" style="text-align: center; max-width: 350px; width: 90%; padding: 40px 20px;">
            <h2 style="color: var(--primary-blue); margin-top: 0; font-size: 26px;">SubliCosturas</h2>
            <p style="color: var(--text-light); margin-bottom: 25px; font-size: 14px;">Ingrese su contraseña para acceder al sistema</p>
            <input type="password" id="login-pass" placeholder="••••" style="margin-bottom: 20px; text-align: center; font-size: 24px; letter-spacing: 5px; font-weight: bold; width: 80%; margin-left: auto; margin-right: auto; display: block;" onkeydown="if(event.key === 'Enter') verificarLogin()">
            <button class="btn-main" onclick="verificarLogin()" style="width: 80%;">Entrar al Sistema</button>
        </div>
    </div>

    <div class="container" id="main-app" style="display: none;">
        <div class="tabs">
            <button id="tab-inicio" class="tab-btn active" onclick="cambiarPestaña('inicio')">📊 Resumen</button>
            <button id="tab-ingreso" class="tab-btn" onclick="cambiarPestaña('ingreso')">📥 Ingreso</button>
            <button id="tab-inventario" class="tab-btn" onclick="cambiarPestaña('inventario')">📦 Inventario</button>
            <button id="tab-ventas" class="tab-btn" onclick="cambiarPestaña('ventas')">🛒 Ventas</button>
            <button id="tab-cotizacion" class="tab-btn" onclick="cambiarPestaña('cotizacion')">📄 Cotización</button>
            <button id="tab-alertas" class="tab-btn" style="color: var(--primary-red);" onclick="cambiarPestaña('alertas')">⚠️ Por Surtir</button>
        </div>

        <div id="sec-inicio" style="display: block;">
            <div class="card">
                <div class="logo-container">
                    <div class="logo-wrapper">
                        <img id="logo-img" src="" alt="Logo SubliCosturas">
                        <button id="btn-edit-logo" class="logo-edit-btn" onclick="document.getElementById('logo-input').click()">✏️</button>
                    </div>
                    <div id="logo-upload-wrapper" class="file-input-wrapper">
                        <button class="btn-upload">📸 Subir Logo de mi Marca</button>
                        <input type="file" id="logo-input" onchange="cargarLogo(event)" accept="image/*">
                    </div>
                </div>

                <button id="btn-instalar-app" onclick="instalarApp()">📲 Instalar SubliCosturas Pro en mi dispositivo</button>

                <h3 class="section-title">Panel de Finanzas</h3>
                <div class="dash-grid">
                    <div class="dash-card bg-blue">
                        <p class="dash-title">Valor del Inventario</p>
                        <p class="dash-value" id="dash-valor-inv">Q 0.00</p>
                    </div>
                    <div class="dash-card bg-purple">
                        <p class="dash-title">Fondo: Productos</p>
                        <p class="dash-value" id="dash-costo-producto">Q 0.00</p>
                        <div style="display: flex; gap: 5px; margin-top: 15px;">
                            <input type="number" id="ret-prod" step="0.01" placeholder="Q monto" style="width: 60%; padding: 5px; border-radius: 4px; border: none; font-size: 12px; text-align: center; color: var(--text-dark);">
                            <button class="dash-btn" style="margin-top: 0; width: 40%; padding: 5px;" onclick="retirarCostoProducto()">Retirar</button>
                        </div>
                    </div>
                    <div class="dash-card bg-orange">
                        <p class="dash-title">Fondo: Luz y Tinta</p>
                        <p class="dash-value" id="dash-costo-luz">Q 0.00</p>
                        <div style="display: flex; gap: 5px; margin-top: 15px;">
                            <input type="number" id="ret-luz" step="0.01" placeholder="Q monto" style="width: 60%; padding: 5px; border-radius: 4px; border: none; font-size: 12px; text-align: center; color: var(--text-dark);">
                            <button class="dash-btn" style="margin-top: 0; width: 40%; padding: 5px;" onclick="retirarCostoLuz()">Retirar</button>
                        </div>
                    </div>
                    <div class="dash-card bg-green">
                        <p class="dash-title">Ganancia Libre</p>
                        <p class="dash-value" id="dash-ganancia">Q 0.00</p>
                        <div style="display: flex; gap: 5px; margin-top: 15px;">
                            <input type="number" id="ret-ganancia" step="0.01" placeholder="Q monto" style="width: 60%; padding: 5px; border-radius: 4px; border: none; font-size: 12px; text-align: center; color: var(--text-dark);">
                            <button class="dash-btn" style="margin-top: 0; width: 40%; padding: 5px;" onclick="retirarGanancia()">Retirar</button>
                        </div>
                    </div>
                </div>
                <div style="margin-top: 25px; text-align: center;">
                    <button onclick="generarReporteExcel()" style="background-color: var(--primary-green); color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px;">📂 Descargar Reporte (Excel)</button>
                </div>
            </div>
        </div>

        <div id="sec-ingreso" style="display: none;"></div>
        <div id="sec-inventario" style="display: none;"></div>
        <div id="sec-ventas" style="display: none;"></div>
        <div id="sec-cotizacion" style="display: none;"></div>
        <div id="sec-alertas" style="display: none;"></div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBX_IY50FSYoP4Q9n0jOiMDL19O7Vwq464",
            authDomain: "sublicosturas-app.firebaseapp.com",
            projectId: "sublicosturas-app",
            storageBucket: "sublicosturas-app.firebasestorage.app",
            messagingSenderId: "672743665524",
            appId: "1:672743665524:web:19af273c8d88b929c18621"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; window.setDoc = setDoc; window.doc = doc; window.getDoc = getDoc;
    </script>

    <script>
        // Lógica de Instalación (PWA)
        let eventoInstalacion;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            eventoInstalacion = e;
            document.getElementById('btn-instalar-app').style.display = 'block';
        });

        function instalarApp() {
            if (eventoInstalacion) {
                eventoInstalacion.prompt();
                eventoInstalacion.userChoice.then((choice) => {
                    if (choice.outcome === 'accepted') document.getElementById('btn-instalar-app').style.display = 'none';
                    eventoInstalacion = null;
                });
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            });
        }

        // Función de Login
        function verificarLogin() {
            if(document.getElementById('login-pass').value === '1010') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                arrancarSistema();
            } else { alert('Incorrecto'); }
        }

        // ... El resto de tus funciones de inventario, ventas y fondos se mantienen iguales ...
    </script>
</body>
</html>
