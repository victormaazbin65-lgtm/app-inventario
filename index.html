<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubliCosturas Pro V11 - Nube</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --bg: #f3f4f6; --card: #ffffff; --blue: #2563eb;
            --green: #16a34a; --red: #dc2626; --purple: #7c3aed;
            --orange: #ea580c; --dark: #1f2937; --light: #6b7280;
            --border: #e5e7eb; --shd: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; padding-bottom: 50px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: var(--card); color: var(--light); box-shadow: var(--shd); }
        .tab-btn.active { background: var(--blue); color: white; }
        .card { background: var(--card); border-radius: 12px; box-shadow: var(--shd); padding: 20px; margin-bottom: 15px; }
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .dash-card { padding: 15px; border-radius: 10px; color: white; text-align: center; }
        .bg-blue { background: var(--blue); } .bg-purple { background: var(--purple); }
        .bg-orange { background: var(--orange); } .bg-green { background: var(--green); }
        .dash-value { font-size: 20px; font-weight: bold; margin: 5px 0; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: var(--light); }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; background: var(--blue); margin-top: 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .status-sync { font-size: 11px; text-align: center; padding: 6px; border-radius: 8px; margin-bottom: 10px; background: #dcfce7; color: #166534; font-weight: bold; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>

    <div class="container">
        <div id="sync-msg" class="status-sync">📡 Conectando a la nube de SubliCosturas...</div>

        <div class="tabs">
            <button id="t-ini" class="tab-btn active" onclick="show('ini')">📊 Resumen</button>
            <button id="t-ing" class="tab-btn" onclick="show('ing')">📥 Ingreso</button>
            <button id="t-inv" class="tab-btn" onclick="show('inv')">📦 Stock</button>
            <button id="t-ven" class="tab-btn" onclick="show('ven')">🛒 Venta</button>
        </div>

        <div id="s-ini" class="card">
            <h3 style="margin-top:0">Panel en Tiempo Real</h3>
            <div class="dash-grid">
                <div class="dash-card bg-blue"><p style="margin:0;font-size:11px;">Valor Inventario</p><p class="dash-value" id="v-inv">Q 0.00</p></div>
                <div class="dash-card bg-purple"><p style="margin:0;font-size:11px;">Fondo Productos</p><p class="dash-value" id="v-f-pro">Q 0.00</p></div>
                <div class="dash-card bg-orange"><p style="margin:0;font-size:11px;">Fondo Luz/Tinta</p><p class="dash-value" id="v-f-luz">Q 0.00</p></div>
                <div class="dash-card bg-green"><p style="margin:0;font-size:11px;">Ganancia Libre</p><p class="dash-value" id="v-gan">Q 0.00</p></div>
            </div>
            <div style="margin-top:20px; text-align:center;">
                <button onclick="exportExcel()" style="background:var(--green); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold;">📂 Descargar Respaldo Excel</button>
            </div>
        </div>

        <div id="s-ing" class="card" style="display:none;">
            <h3 style="margin-top:0">Registrar Producto</h3>
            <div class="form-group"><label>Nombre</label><input type="text" id="i-nom"></div>
            <div class="dash-grid">
                <div class="form-group"><label>Stock</label><input type="number" id="i-can"></div>
                <div class="form-group"><label>Costo (Q)</label><input type="number" id="i-cos" step="0.1"></div>
            </div>
            <button class="btn-main" onclick="saveInv()">✅ Guardar en la Nube</button>
        </div>

        <div id="s-inv" class="card" style="display:none;"><h3 style="margin-top:0">Inventario Sincronizado</h3><div id="list-inv"></div></div>

        <div id="s-ven" class="card" style="display:none;">
            <h3 style="margin-top:0">Nueva Venta</h3>
            <div class="form-group"><label>Producto</label><select id="v-sel"></select></div>
            <div class="dash-grid">
                <div class="form-group"><label>Cantidad</label><input type="number" id="v-can" value="1"></div>
                <div class="form-group"><label>Precio Venta (Q)</label><input type="number" id="v-pre"></div>
            </div>
            <div class="dash-grid">
                <div class="form-group"><label>Luz/Tinta (Q)</label><input type="number" id="v-tin" value="0"></div>
                <div class="form-group"><label>Mensajero (Q)</label><input type="number" id="v-env" value="0"></div>
            </div>
            <button class="btn-main" style="background:var(--green)" onclick="doVenta()">💰 Finalizar y Sincronizar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBX_IY50FSYoP4Q9n8jOIndL19O7Vwq464",
            authDomain: "sublicosturas-app.firebaseapp.com",
            projectId: "sublicosturas-app",
            storageBucket: "sublicosturas-app.firebasestorage.app",
            messagingSenderId: "672743665524",
            appId: "1:672743665524:web:19af273c8d88b929c18621"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let inv = [];
        let fnd = { costoProducto: 0, costoLuzTinta: 0, gananciaLibre: 0 };

        db.ref('sublicosturas').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                inv = data.inventario || [];
                fnd = data.fondos || { costoProducto: 0, costoLuzTinta: 0, gananciaLibre: 0 };
                render();
                document.getElementById('sync-msg').innerText = "✅ SISTEMA EN LÍNEA Y SINCRONIZADO";
            }
        });

        function show(p) {
            ['ini','ing','inv','ven'].forEach(id => {
                document.getElementById('s-'+id).style.display = 'none';
                document.getElementById('t-'+id).classList.remove('active');
            });
            document.getElementById('s-'+p).style.display = 'block';
            document.getElementById('t-'+p).classList.add('active');
            if(p === 'ven') fillVen();
        }

        function saveInv() {
            const n = document.getElementById('i-nom').value;
            const c = parseInt(document.getElementById('i-can').value);
            const cos = parseFloat(document.getElementById('i-cos').value);
            if(!n || isNaN(c)) return alert("Datos inválidos");
            inv.push({ id: Date.now(), nombre: n, stock: c, costo: cos });
            db.ref('sublicosturas/inventario').set(inv);
            alert("Guardado!");
            document.getElementById('i-nom').value=""; document.getElementById('i-can').value=""; document.getElementById('i-cos').value="";
        }

        function doVenta() {
            const id = document.getElementById('v-sel').value;
            const q = parseInt(document.getElementById('v-can').value);
            const p = parseFloat(document.getElementById('v-pre').value);
            const tin = parseFloat(document.getElementById('v-tin').value) || 0;
            const env = parseFloat(document.getElementById('v-env').value) || 0;

            const item = inv.find(x => x.id == id);
            if(!item || item.stock < q) return alert("Error de Stock");

            item.stock -= q;
            const cMat = q * item.costo;
            const gan = (q * p) - cMat - tin - env;

            fnd.costoProducto += cMat;
            fnd.costoLuzTinta += tin;
            fnd.gananciaLibre += gan;

            db.ref('sublicosturas').update({ inventario: inv, fondos: fnd });
            alert("Venta procesada!");
        }

        function render() {
            document.getElementById('v-inv').innerText = 'Q ' + inv.reduce((s,x)=>s+(x.stock*x.costo),0).toFixed(2);
            document.getElementById('v-f-pro').innerText = 'Q ' + fnd.costoProducto.toFixed(2);
            document.getElementById('v-f-luz').innerText = 'Q ' + fnd.costoLuzTinta.toFixed(2);
            document.getElementById('v-gan').innerText = 'Q ' + fnd.gananciaLibre.toFixed(2);
            const l = document.getElementById('list-inv');
            l.innerHTML = "";
            inv.forEach(x => {
                l.innerHTML += `<div class="item-row"><span><b>${x.nombre}</b> (Stock: ${x.stock})</span><button onclick="del(${x.id})" style="border:none;background:none;color:red;cursor:pointer">❌</button></div>`;
            });
        }

        function del(id) {
            if(confirm("¿Borrar?")) {
                inv = inv.filter(x => x.id != id);
                db.ref('sublicosturas/inventario').set(inv);
            }
        }

        function fillVen() {
            const s = document.getElementById('v-sel');
            s.innerHTML = inv.map(x => `<option value="${x.id}">${x.nombre} (${x.stock})</option>`).join('');
        }

        function exportExcel() {
            const wb = XLSX.utils.book_new();
            const ws1 = XLSX.utils.json_to_sheet([{ "Resumen": "Valor Inventario", "Total": inv.reduce((s,x)=>s+(x.stock*x.costo),0) }, { "Resumen": "Ganancia", "Total": fnd.gananciaLibre }]);
            const ws2 = XLSX.utils.json_to_sheet(inv);
            XLSX.utils.book_append_sheet(wb, ws1, "Finanzas");
            XLSX.utils.book_append_sheet(wb, ws2, "Productos");
            XLSX.writeFile(wb, "SubliCosturas_Cloud.xlsx");
        }
    </script>
</body>
</html>
