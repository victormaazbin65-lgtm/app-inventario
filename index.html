<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBX_IY50FSYoP4Q9n0jOiMDL19O7Vwq464",
            authDomain: "sublicosturas-app.firebaseapp.com",
            projectId: "sublicosturas-app",
            storageBucket: "sublicosturas-app.firebasestorage.app",
            messagingSenderId: "672743665524",
            appId: "1:672743665524:web:19af273c8d88b929c18621",
            measurementId: "G-EHE8KQVFEE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Compartir funciones con el resto del código
        window.db = db;
        window.setDoc = setDoc;
        window.doc = doc;
        window.getDoc = getDoc;

        console.log("🔥 Firebase Conectado");
        
        // Intentar sincronizar después de que la página cargue
        setTimeout(() => {
            if(window.cargarDesdeNube) window.cargarDesdeNube();
        }, 1500);
    </script>

    <script>
        const KEY_INV = 'subli_inv_v10';
        const KEY_VENTAS = 'subli_vent_v10';
        const KEY_FONDOS = 'subli_fondos_v10';
        const KEY_INGRESOS = 'subli_ingresos_v10';

        let inventario = [];
        let ventas = [];
        let historialIngresos = [];
        let fondos = { costoProducto: 0, costoLuzTinta: 0, gananciaLibre: 0 };
        
        let carritoIngresos = [];
        let carritoVentas = [];

        async function cargarDesdeNube() {
            if(!window.db || !window.doc || !window.getDoc) return;
            try {
                const docRef = window.doc(window.db, "sistema", "datos_actuales");
                const docSnap = await window.getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    inventario = data.inventario || [];
                    ventas = data.ventas || [];
                    fondos = data.fondos || { costoProducto: 0, costoLuzTinta: 0, gananciaLibre: 0 };
                    historialIngresos = data.historialIngresos || [];
                    guardarLocalParaCache();
                    actualizarUI();
                    console.log("☁️ Sincronizado con la nube");
                }
            } catch (e) { console.error("Error nube:", e); }
        }

        function guardarLocalParaCache() {
            localStorage.setItem(KEY_INV, JSON.stringify(inventario));
            localStorage.setItem(KEY_VENTAS, JSON.stringify(ventas));
            localStorage.setItem(KEY_FONDOS, JSON.stringify(fondos));
            localStorage.setItem(KEY_INGRESOS, JSON.stringify(historialIngresos));
        }

        function cargarDatos() {
            try {
                const dataInv = localStorage.getItem(KEY_INV);
                if (dataInv) inventario = JSON.parse(dataInv);
                const dataVent = localStorage.getItem(KEY_VENTAS);
                if (dataVent) ventas = JSON.parse(dataVent);
                const dataFondos = localStorage.getItem(KEY_FONDOS);
                if (dataFondos) fondos = JSON.parse(dataFondos);
                const dataIngresos = localStorage.getItem(KEY_INGRESOS);
                if (dataIngresos) historialIngresos = JSON.parse(dataIngresos);
            } catch (e) { console.log("Iniciando..."); }
            mostrarLogo();
            actualizarUI();
        }

        async function guardarDatos() {
            guardarLocalParaCache();
            if(window.db && window.setDoc && window.doc) {
                try {
                    await window.setDoc(window.doc(window.db, "sistema", "datos_actuales"), {
                        inventario, ventas, fondos, historialIngresos, ultimaActualizacion: new Date()
                    });
                    console.log("☁️ Nube actualizada");
                } catch (e) { console.error("Error al subir:", e); }
            }
        }

        // --- FUNCIONES DE DISEÑO Y LÓGICA (NO TOCAR) ---
        function cambiarPestaña(pestaña) {
            ['inicio', 'ingreso', 'inventario', 'ventas'].forEach(p => {
                document.getElementById('sec-' + p).style.display = 'none';
                document.getElementById('tab-' + p).classList.remove('active');
            });
            document.getElementById('sec-' + pestaña).style.display = 'block';
            document.getElementById('tab-' + pestaña).classList.add('active');
            if(pestaña === 'inicio') actualizarUI(); 
            if(pestaña === 'ingreso') { renderSelectIngreso(); renderHistorialIngresos(); }
            if(pestaña === 'ventas') renderSelectVentas();
        }

        function cargarLogo(event) {
            const file = event.target.files[0];
            if(file){
                const reader = new FileReader();
                reader.onload = function(e){
                    localStorage.setItem('subli_logo', e.target.result);
                    mostrarLogo();
                };
                reader.readAsDataURL(file);
            }
        }

        function mostrarLogo() {
            const logo = localStorage.getItem('subli_logo');
            const img = document.getElementById('logo-img');
            const btnEdit = document.getElementById('btn-edit-logo');
            const upload = document.getElementById('logo-upload-wrapper');
            if(logo && img){
                img.src = logo; img.style.display = 'block';
                if(btnEdit) btnEdit.style.display = 'flex';
                if(upload) upload.style.display = 'none';
            }
        }

        function toggleNuevoProducto() {
            const val = document.getElementById('inv-select').value;
            document.getElementById('grupo-nombre-producto').style.display = val === 'nuevo' ? 'block' : 'none';
        }

        function renderSelectIngreso() {
            const select = document.getElementById('inv-select');
            select.innerHTML = '<option value="nuevo">➕ Crear un Producto Nuevo</option>';
            inventario.forEach(p => { select.innerHTML += `<option value="${p.id}">Añadir stock a: ${p.nombre}</option>`; });
        }

        function agregarAlCarritoIngreso() {
            const selectId = document.getElementById('inv-select').value;
            const stock = parseInt(document.getElementById('inv-stock').value);
            const costoBase = parseFloat(document.getElementById('inv-costo').value);
            const proveedor = document.getElementById('inv-proveedor').value.trim() || 'No especificado';
            if (isNaN(stock) || isNaN(costoBase) || stock <= 0) { alert("⚠️ Revisa cantidad y costo."); return; }
            let nombreProd = selectId === 'nuevo' ? document.getElementById('inv-nombre').value.trim() : (inventario.find(p => p.id == selectId)?.nombre || "Producto");
            if (selectId === 'nuevo' && !nombreProd) { alert("⚠️ Escribe el nombre."); return; }
            carritoIngresos.push({ tempId: Date.now(), isNew: selectId === 'nuevo', idOriginal: selectId !== 'nuevo' ? selectId : null, nombre: nombreProd, stock: stock, costoBase: costoBase, proveedor: proveedor });
            document.getElementById('inv-stock').value = ''; document.getElementById('inv-costo').value = ''; document.getElementById('inv-nombre').value = '';
            renderCarritoIngresos();
        }

        function renderCarritoIngresos() {
            const contenedor = document.getElementById('lista-ingresos-pendientes');
            if (carritoIngresos.length === 0) { contenedor.innerHTML = '<p style="text-align:center;">Lista vacía.</p>'; return; }
            contenedor.innerHTML = '';
            carritoIngresos.forEach(item => {
                contenedor.innerHTML += `<div class="item-row"><div class="item-info"><p class="item-title">${item.nombre}</p><p class="item-details">+${item.stock} pzs | Q${item.costoBase.toFixed(2)} c/u</p></div><button onclick="carritoIngresos = carritoIngresos.filter(i => i.tempId !== ${item.tempId}); renderCarritoIngresos();" class="btn-sm btn-delete">X</button></div>`;
            });
        }

        function procesarIngresoMultiple() {
            if(carritoIngresos.length === 0) return;
            const transporteGlobal = parseFloat(document.getElementById('ingreso-transporte-global').value) || 0;
            const totalPiezas = carritoIngresos.reduce((acc, item) => acc + item.stock, 0);
            const transportePorPieza = totalPiezas > 0 ? (transporteGlobal / totalPiezas) : 0;
            let registro = { id: Date.now(), fecha: new Date().toLocaleString(), items: [] };
            carritoIngresos.forEach(item => {
                const costoFinal = item.costoBase + transportePorPieza;
                if(item.isNew) {
                    inventario.push({ id: Date.now() + Math.random(), nombre: item.nombre, stock: item.stock, costo: costoFinal, proveedor: item.proveedor });
                } else {
                    const p = inventario.find(x => x.id == item.idOriginal);
                    if(p) { p.costo = ((p.stock * p.costo) + (item.stock * costoFinal)) / (p.stock + item.stock); p.stock += item.stock; }
                }
                registro.items.push({ nombre: item.nombre, stock: item.stock });
            });
            historialIngresos.push(registro);
            carritoIngresos = []; document.getElementById('ingreso-transporte-global').value = '';
            guardarDatos(); actualizarUI(); renderCarritoIngresos(); renderHistorialIngresos();
        }

        function renderHistorialIngresos() {
            const cont = document.getElementById('lista-historial-ingresos');
            cont.innerHTML = historialIngresos.length === 0 ? '<p style="text-align:center;">Sin historial.</p>' : '';
            [...historialIngresos].reverse().forEach(reg => {
                cont.innerHTML += `<div class="item-row"><div class="item-info"><p class="item-title">${reg.fecha}</p><p class="item-details">${reg.items.map(i => `+${i.stock} ${i.nombre}`).join(', ')}</p></div></div>`;
            });
        }

        function renderSelectVentas() {
            const select = document.getElementById('venta-producto');
            select.innerHTML = '<option value="">-- Selecciona --</option>';
            inventario.forEach(p => { if(p.stock > 0) select.innerHTML += `<option value="${p.id}">${p.nombre} (${p.stock})</option>`; });
        }

        function agregarAlCarritoVenta() {
            const idProd = document.getElementById('venta-producto').value;
            const qty = parseInt(document.getElementById('venta-qty').value);
            const precio = parseFloat(document.getElementById('venta-precio').value) || 0;
            const rol = document.getElementById('venta-rol').value;
            if(!idProd || qty <= 0) return;
            const p = inventario.find(x => x.id == idProd);
            if(p.stock < qty) { alert("Stock insuficiente"); return; }
            carritoVentas.push({ tempId: Date.now(), idProd: p.id, nombre: p.nombre, qty, precioCobrado: precio, costoBase: p.costo, rol });
            renderCarritoVentas();
        }

        function renderCarritoVentas() {
            const cont = document.getElementById('lista-carrito-ventas');
            let total = 0;
            cont.innerHTML = carritoVentas.length === 0 ? '<p style="text-align:center;">Vacío.</p>' : '';
            carritoVentas.forEach(item => {
                total += (item.qty * item.precioCobrado);
                cont.innerHTML += `<div class="item-row"><div class="item-info"><p class="item-title">${item.qty}x ${item.nombre}</p></div><button onclick="carritoVentas = carritoVentas.filter(i => i.tempId !== ${item.tempId}); renderCarritoVentas();" class="btn-sm btn-delete">X</button></div>`;
            });
            document.getElementById('venta-total-preview').innerText = `Total: Q ${total.toFixed(2)}`;
        }

        function procesarVentaMultiple() {
            if(carritoVentas.length === 0) return;
            let ingreso = 0, costoProd = 0;
            let resumen = [];
            const tinta = parseFloat(document.getElementById('venta-tinta').value) || 0;
            const envio = parseFloat(document.getElementById('venta-envio').value) || 0;
            
            carritoVentas.forEach(item => {
                const p = inventario.find(x => x.id == item.idProd);
                if(p) p.stock -= item.qty;
                ingreso += (item.qty * item.precioCobrado);
                costoProd += (item.qty * item.costoBase);
                resumen.push(`${item.qty}x ${item.nombre}`);
            });

            const ganancia = ingreso - (costoProd + tinta + envio);
            fondos.costoProducto += costoProd; fondos.costoLuzTinta += tinta; fondos.gananciaLibre += ganancia;
            ventas.push({ id: Date.now(), fecha: new Date().toLocaleString(), resumenItems: resumen.join(', '), ingresoTotal: ingreso, costosProductos: costoProd, costoTinta: tinta, costoEnvio: envio, ganancia, detalleItems: [...carritoVentas] });
            
            carritoVentas = []; document.getElementById('venta-tinta').value = ''; document.getElementById('venta-envio').value = '';
            guardarDatos(); actualizarUI(); renderCarritoVentas();
            alert("💰 Venta Exitosa");
        }

        function actualizarUI() {
            const valInv = inventario.reduce((s, p) => s + (p.stock * p.costo), 0);
            document.getElementById('dash-valor-inv').innerText = 'Q ' + valInv.toFixed(2);
            document.getElementById('dash-costo-producto').innerText = 'Q ' + fondos.costoProducto.toFixed(2);
            document.getElementById('dash-costo-luz').innerText = 'Q ' + fondos.costoLuzTinta.toFixed(2);
            document.getElementById('dash-ganancia').innerText = 'Q ' + fondos.gananciaLibre.toFixed(2);
            
            const contInv = document.getElementById('lista-inventario');
            contInv.innerHTML = '';
            inventario.forEach(p => {
                contInv.innerHTML += `<div class="item-row"><div class="item-info"><p class="item-title">${p.nombre}</p><p class="item-details">Stock: ${p.stock} | Q${p.costo.toFixed(2)}</p></div><div class="item-actions"><button onclick="borrarProducto(${p.id})" class="btn-sm btn-delete">Borrar</button></div></div>`;
            });

            const contVentas = document.getElementById('lista-ventas');
            contVentas.innerHTML = '';
            [...ventas].reverse().forEach(v => {
                contVentas.innerHTML += `<div class="item-row"><div class="item-info"><p class="item-title">${v.resumenItems}</p><p class="item-details">Ganancia: Q${v.ganancia.toFixed(2)}</p></div></div>`;
            });
            renderSelectIngreso(); renderSelectVentas();
        }

        function borrarProducto(id) { if(confirm("¿Borrar?")) { inventario = inventario.filter(p => p.id !== id); guardarDatos(); actualizarUI(); } }
        function reiniciarCostoProducto() { if(confirm("¿Retirar?")) { fondos.costoProducto = 0; guardarDatos(); actualizarUI(); } }
        function reiniciarCostoLuzTinta() { if(confirm("¿Retirar?")) { fondos.costoLuzTinta = 0; guardarDatos(); actualizarUI(); } }
        function reiniciarGanancia() { if(confirm("¿Retirar?")) { fondos.gananciaLibre = 0; guardarDatos(); actualizarUI(); } }

        cargarDatos();
    </script>
