<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubliCosturas - Sistema Pro V11 (Nube)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --primary-blue: #2563eb;
            --primary-green: #16a34a;
            --primary-red: #dc2626;
            --primary-purple: #7c3aed;
            --primary-orange: #ea580c;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --border-color: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 850px; padding-bottom: 50px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; background-color: var(--card-bg); color: var(--text-light); box-shadow: var(--shadow); transition: 0.3s; min-width: 120px; }
        .tab-btn.active { background-color: var(--primary-blue); color: white; }
        .card { background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
        .section-title { margin-top: 0; border-bottom: 2px solid var(--bg-color); padding-bottom: 10px; color: var(--text-dark); }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-wrapper { position: relative; display: inline-block; }
        #logo-img { max-width: 180px; max-height: 180px; border-radius: 15px; object-fit: contain; display: none; }
        .logo-edit-btn { background: white; border: 1px solid #ccc; border-radius: 50%; width: 35px; height: 35px; position: absolute; bottom: -10px; right: -10px; cursor: pointer; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-size: 18px; align-items: center; justify-content: center; padding: 0;}
        .file-input-wrapper { display: inline-block; position: relative; overflow: hidden; }
        .file-input-wrapper input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }
        .btn-upload { background: var(--bg-color); color: var(--text-dark); padding: 8px 15px; border-radius: 8px; font-size: 12px; border: 1px solid var(--border-color); font-weight: bold;}
        .dash-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .dash-grid { grid-template-columns: 1fr 1fr; } }
        .dash-card { padding: 20px; border-radius: 12px; color: white; text-align: center; box-shadow: var(--shadow); }
        .bg-blue { background-color: var(--primary-blue); } .bg-purple { background-color: var(--primary-purple); }
        .bg-orange { background-color: var(--primary-orange); } .bg-green { background-color: var(--primary-green); }
        .dash-title { font-size: 13px; text-transform: uppercase; opacity: 0.9; margin: 0 0 5px 0; }
        .dash-value { font-size: 26px; font-weight: bold; margin: 0; }
        .dash-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-top: 15px; width: 100%; font-weight: bold; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; color: var(--text-light); margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; box-sizing: border-box; background-color: #f9fafb; }
        button.btn-main { width: 100%; padding: 15px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border-color); padding: 12px 0; }
        .status-sync { font-size: 11px; text-align: center; padding: 6px; border-radius: 8px; margin-bottom: 15px; background: #dcfce7; color: #166534; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div id="sync-msg" class="status-sync">📡 Conectando a la nube de SubliCosturas...</div>
        
        <div class="tabs">
            <button id="tab-inicio" class="tab-btn active" onclick="cambiarPestaña('inicio')">📊 Resumen</button>
            <button id="tab-ingreso" class="tab-btn" onclick="cambiarPestaña('ingreso')">📥 Ingreso</button>
            <button id="tab-inventario" class="tab-btn" onclick="cambiarPestaña('inventario')">📦 Inventario</button>
            <button id="tab-ventas" class="tab-btn" onclick="cambiarPestaña('ventas')">🛒 Ventas</button>
        </div>

        <div id="sec-inicio" style="display: block;">
            <div class="card">
                <div class="logo-container">
                    <div class="logo-wrapper">
                        <img id="logo-img" src="" alt="Logo SubliCosturas">
                        <button id="btn-edit-logo" class="logo-edit-btn" onclick="document.getElementById('logo-input').click()">✏️</button>
                    </div>
                    <div id="logo-upload-wrapper" class="file-input-wrapper">
                        <button class="btn-upload">📸 Subir Logo de mi Marca</button>
                        <input type="file" id="logo-input" onchange="cargarLogo(event)" accept="image/*">
                    </div>
                </div>
                <h3 class="section-title">Panel de Finanzas</h3>
                <div class="dash-grid">
                    <div class="dash-card bg-blue"><p class="dash-title">Valor del Inventario</p><p class="dash-value" id="dash-valor-inv">Q 0.00</p></div>
                    <div class="dash-card bg-purple"><p class="dash-title">Fondo: Productos</p><p class="dash-value" id="dash-costo-producto">Q 0.00</p><button class="dash-btn" onclick="reiniciarCostoProducto()">🔄 Retirar</button></div>
                    <div class="dash-card bg-orange"><p class="dash-title">Fondo: Luz y Tinta</p><p class="dash-value" id="dash-costo-luz">Q 0.00</p><button class="dash-btn" onclick="reiniciarCostoLuzTinta()">💡 Retirar</button></div>
                    <div class="dash-card bg-green"><p class="dash-title">Ganancia Libre</p><p class="dash-value" id="dash-ganancia">Q 0.00</p><button class="dash-btn" onclick="reiniciarGanancia()">💵 Retirar</button></div>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <button onclick="generarReporteExcel()" style="background:var(--primary-green); color:white; padding:12px 25px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">📂 Descargar Excel Completo</button>
                </div>
            </div>
        </div>

        <div id="sec-ingreso" style="display: none;">
            <div class="card">
                <h3 class="section-title">Ingreso de Mercadería</h3>
                <div class="form-group"><label>Nombre del Producto</label><input type="text" id="inv-nombre"></div>
                <div class="grid-2">
                    <div class="form-group"><label>Cantidad</label><input type="number" id="inv-stock"></div>
                    <div class="form-group"><label>Costo Unitario (Q)</label><input type="number" id="inv-costo" step="0.01"></div>
                </div>
                <button class="btn-main" onclick="agregarAlInventario()">✅ Guardar en la Nube</button>
            </div>
        </div>

        <div id="sec-inventario" style="display: none;">
            <div class="card">
                <h3 class="section-title">Mi Inventario Actual</h3>
                <div id="lista-inventario"></div>
            </div>
        </div>

        <div id="sec-ventas" style="display: none;">
            <div class="card">
                <h3 class="section-title">Registrar Venta</h3>
                <div class="form-group"><label>Selecciona Producto</label><select id="venta-producto"></select></div>
                <div class="grid-2">
                    <div class="form-group"><label>Cantidad</label><input type="number" id="venta-qty" value="1"></div>
                    <div class="form-group"><label>Precio Venta (Q)</label><input type="number" id="venta-precio"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Luz/Tinta (Q)</label><input type="number" id="venta-tinta" value="0"></div>
                    <div class="form-group"><label>Mensajero (Q)</label><input type="number" id="venta-envio" value="0"></div>
                </div>
                <button class="btn-main" style="background:var(--primary-green)" onclick="procesarVenta()">💰 Finalizar Venta</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE VICTOR MAAZ
        const firebaseConfig = {
            apiKey: "AIzaSyBX_IY50FSYoP4Q9n8jOIndL19O7Vwq464",
            authDomain: "sublicosturas-app.firebaseapp.com",
            projectId: "sublicosturas-app",
            storageBucket: "sublicosturas-app.firebasestorage.app",
            messagingSenderId: "672743665524",
            appId: "1:672743665524:web:19af273c8d88b929c18621"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let inventario = [];
        let fondos = { costoProducto: 0, costoLuzTinta: 0, gananciaLibre: 0 };

        // ESCUCHA EN TIEMPO REAL
        db.ref('sublicosturas').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                inventario = data.inventario || [];
                fondos = data.fondos || { costoProducto: 0, costoLuzTinta: 0, gananciaLibre: 0 };
                actualizarUI();
                document.getElementById('sync-msg').innerText = "✅ SISTEMA EN LÍNEA Y SINCRONIZADO";
            }
        });

        function cambiarPestaña(p) {
            ['inicio', 'ingreso', 'inventario', 'ventas'].forEach(s => document.getElementById('sec-' + s).style.display = 'none');
            ['tab-inicio', 'tab-ingreso', 'tab-inventario', 'tab-ventas'].forEach(t => document.getElementById(t).classList.remove('active'));
            document.getElementById('sec-' + p).style.display = 'block';
            document.getElementById('tab-' + p).classList.add('active');
            if(p === 'ventas') renderSelectVentas();
        }

        function agregarAlInventario() {
            const n = document.getElementById('inv-nombre').value;
            const s = parseInt(document.getElementById('inv-stock').value);
            const c = parseFloat(document.getElementById('inv-costo').value);
            if(!n || isNaN(s)) return alert("Datos incompletos");
            inventario.push({ id: Date.now(), nombre: n, stock: s, costo: c });
            db.ref('sublicosturas/inventario').set(inventario);
            document.getElementById('inv-nombre').value=""; document.getElementById('inv-stock').value=""; document.getElementById('inv-costo').value="";
        }

        function procesarVenta() {
            const id = document.getElementById('venta-producto').value;
            const q = parseInt(document.getElementById('venta-qty').value);
            const p = parseFloat(document.getElementById('venta-precio').value);
            const tin = parseFloat(document.getElementById('venta-tinta').value) || 0;
            const env = parseFloat(document.getElementById('venta-envio').value) || 0;

            const item = inventario.find(x => x.id == id);
            if(!item || item.stock < q) return alert("Stock insuficiente");

            item.stock -= q;
            const cMat = q * item.costo;
            const gan = (q * p) - cMat - tin - env;

            fondos.costoProducto += cMat;
            fondos.costoLuzTinta += tin;
            fondos.gananciaLibre += gan;

            db.ref('sublicosturas').update({ inventario, fondos });
            alert("Venta sincronizada!");
        }

        function reiniciarCostoProducto() { if(confirm("¿Retirar fondo?")) { fondos.costoProducto = 0; db.ref('sublicosturas/fondos').set(fondos); } }
        function reiniciarCostoLuzTinta() { if(confirm("¿Retirar fondo?")) { fondos.costoLuzTinta = 0; db.ref('sublicosturas/fondos').set(fondos); } }
        function reiniciarGanancia() { if(confirm("¿Retirar ganancia?")) { fondos.gananciaLibre = 0; db.ref('sublicosturas/fondos').set(fondos); } }

        function actualizarUI() {
            document.getElementById('dash-valor-inv').innerText = 'Q ' + inventario.reduce((s,x)=>s+(x.stock*x.costo),0).toFixed(2);
            document.getElementById('dash-costo-producto').innerText = 'Q ' + fondos.costoProducto.toFixed(2);
            document.getElementById('dash-costo-luz').innerText = 'Q ' + fondos.costoLuzTinta.toFixed(2);
            document.getElementById('dash-ganancia').innerText = 'Q ' + fondos.gananciaLibre.toFixed(2);
            
            const cont = document.getElementById('lista-inventario');
            cont.innerHTML = inventario.length ? "" : "Vacio";
            inventario.forEach(x => {
                cont.innerHTML += `<div class="item-row"><span><b>${x.nombre}</b> (Stock: ${x.stock})</span><button onclick="borrarProd(${x.id})" style="border:none;color:red;cursor:pointer">❌</button></div>`;
            });
        }

        function borrarProd(id) {
            if(confirm("¿Borrar?")) {
                inventario = inventario.filter(x => x.id != id);
                db.ref('sublicosturas/inventario').set(inventario);
            }
        }

        function renderSelectVentas() {
            const s = document.getElementById('venta-producto');
            s.innerHTML = inventario.map(x => `<option value="${x.id}">${x.nombre} (${x.stock})</option>`).join('');
        }

        function generarReporteExcel() {
            const wb = XLSX.utils.book_new();
            const ws1 = XLSX.utils.json_to_sheet(inventario);
            XLSX.utils.book_append_sheet(wb, ws1, "Inventario");
            XLSX.writeFile(wb, "SubliCosturas_Nube.xlsx");
        }

        function cargarLogo(event) {
            const file = event.target.files[0];
            if(file){
                const reader = new FileReader();
                reader.onload = function(e){
                    localStorage.setItem('subli_logo', e.target.result);
                    mostrarLogo();
                };
                reader.readAsDataURL(file);
            }
        }
        function mostrarLogo() {
            const logo = localStorage.getItem('subli_logo');
            if(logo){
                document.getElementById('logo-img').src = logo;
                document.getElementById('logo-img').style.display = 'block';
                document.getElementById('btn-edit-logo').style.display = 'flex';
                document.getElementById('logo-upload-wrapper').style.display = 'none';
            }
        }
        mostrarLogo();
    </script>
</body>
</html>
