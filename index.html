<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubliCosturas - Sistema Pro V11 (Sincronizado)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f3f4f6; --card-bg: #ffffff; --primary-blue: #2563eb;
            --primary-green: #16a34a; --primary-red: #dc2626; --primary-purple: #7c3aed;
            --primary-orange: #ea580c; --text-dark: #1f2937; --text-light: #6b7280;
            --border-color: #e5e7eb; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 850px; padding-bottom: 50px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; background-color: var(--card-bg); color: var(--text-light); box-shadow: var(--shadow); transition: 0.3s; min-width: 120px; }
        .tab-btn.active { background-color: var(--primary-blue); color: white; }
        .card { background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
        .section-title { margin-top: 0; border-bottom: 2px solid var(--bg-color); padding-bottom: 10px; color: var(--text-dark); }
        .dash-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .dash-grid { grid-template-columns: 1fr 1fr; } }
        .dash-card { padding: 20px; border-radius: 12px; color: white; text-align: center; box-shadow: var(--shadow); }
        .bg-blue { background-color: var(--primary-blue); } .bg-purple { background-color: var(--primary-purple); }
        .bg-orange { background-color: var(--primary-orange); } .bg-green { background-color: var(--primary-green); }
        .dash-value { font-size: 26px; font-weight: bold; margin: 0; }
        .dash-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-top: 15px; width: 100%; font-weight: bold; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; color: var(--text-light); margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        button.btn-main { width: 100%; padding: 15px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding: 12px 0; }
        .btn-delete { background-color: #fecaca; color: var(--primary-red); border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
        .status-bar { background: #e0f2fe; color: #0369a1; padding: 5px; font-size: 11px; text-align: center; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="sync-status" class="status-bar">📡 Conectando con la nube de SubliCosturas...</div>

        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarPestaña('inicio')">📊 Resumen</button>
            <button class="tab-btn" onclick="cambiarPestaña('ingreso')">📥 Ingreso</button>
            <button class="tab-btn" onclick="cambiarPestaña('inventario')">📦 Inventario</button>
            <button class="tab-btn" onclick="cambiarPestaña('ventas')">🛒 Ventas</button>
        </div>

        <div id="sec-inicio" class="card">
            <h3 class="section-title">Panel Sincronizado</h3>
            <div class="dash-grid">
                <div class="dash-card bg-blue"><p>Valor Inventario</p><p class="dash-value" id="dash-valor-inv">Q 0.00</p></div>
                <div class="dash-card bg-purple"><p>Fondo Productos</p><p class="dash-value" id="dash-costo-producto">Q 0.00</p><button class="dash-btn" onclick="resetFondo('costoProducto')">Retirar</button></div>
                <div class="dash-card bg-orange"><p>Fondo Luz/Tinta</p><p class="dash-value" id="dash-costo-luz">Q 0.00</p><button class="dash-btn" onclick="resetFondo('costoLuzTinta')">Retirar</button></div>
                <div class="dash-card bg-green"><p>Ganancia Libre</p><p class="dash-value" id="dash-ganancia">Q 0.00</p><button class="dash-btn" onclick="resetFondo('gananciaLibre')">Retirar</button></div>
            </div>
            <div style="margin-top: 20px; text-align: center;">
                <button onclick="generarReporteExcel()" style="background: #16a34a; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer;">📂 Descargar Reporte Excel</button>
            </div>
        </div>

        <div id="sec-ingreso" class="card" style="display:none;">
            <h3 class="section-title">Nuevo Ingreso</h3>
            <div class="form-group"><label>Nombre Producto</label><input type="text" id="inv-nombre"></div>
            <div class="grid-2">
                <div class="form-group"><label>Cantidad</label><input type="number" id="inv-stock"></div>
                <div class="form-group"><label>Costo Unitario</label><input type="number" id="inv-costo" step="0.01"></div>
            </div>
            <button class="btn-main" onclick="agregarInventario()">✅ Guardar en la Nube</button>
        </div>

        <div id="sec-inventario" class="card" style="display:none;">
            <h3 class="section-title">Inventario en Tiempo Real</h3>
            <div id="lista-inventario"></div>
        </div>

        <div id="sec-ventas" class="card" style="display:none;">
            <h3 class="section-title">Registrar Venta</h3>
            <div class="form-group"><label>Seleccionar Producto</label><select id="venta-producto"></select></div>
            <div class="grid-2">
                <div class="form-group"><label>Cantidad</label><input type="number" id="venta-qty" value="1"></div>
                <div class="form-group"><label>Precio Venta</label><input type="number" id="venta-precio" step="0.01"></div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>Gasto Luz/Tinta</label><input type="number" id="venta-tinta" value="0"></div>
                <div class="form-group"><label>Pago Mensajero</label><input type="number" id="venta-envio" value="0"></div>
            </div>
            <button class="btn-main" style="background:#16a34a;" onclick="procesarVenta()">💰 Cobrar y Sincronizar</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TUS LLAVES DE FIREBASE (EXTRAÍDAS DE TU IMAGEN)
        const firebaseConfig = {
            apiKey: "AIzaSyBX_IY5BfSYOp4Q9n8jOIndL19O7vwq464",
            authDomain: "sublicosturas-app.firebaseapp.com",
            projectId: "sublicosturas-app",
            storageBucket: "sublicosturas-app.appspot.com",
            messagingSenderId: "672743665624",
            appId: "1:672743665624:web:19af273c8d88b929c18621"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let inventario = [];
        let fondos = { costoProducto: 0, costoLuzTinta: 0, gananciaLibre: 0 };

        // ESCUCHA EN TIEMPO REAL (Aquí ocurre la magia de la sincronización)
        db.ref('negocio').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                inventario = data.inventario || [];
                fondos = data.fondos || { costoProducto: 0, costoLuzTinta: 0, gananciaLibre: 0 };
                actualizarUI();
                document.getElementById('sync-status').innerText = "✅ Sincronizado con la nube";
                document.getElementById('sync-status').style.background = "#dcfce7";
            }
        });

        function cambiarPestaña(p) {
            ['inicio', 'ingreso', 'inventario', 'ventas'].forEach(s => document.getElementById('sec-'+s).style.display = 'none');
            document.getElementById('sec-'+p).style.display = 'block';
            if(p === 'ventas') renderSelectVentas();
        }

        function agregarInventario() {
            const nombre = document.getElementById('inv-nombre').value;
            const stock = parseInt(document.getElementById('inv-stock').value);
            const costo = parseFloat(document.getElementById('inv-costo').value);
            
            if(!nombre || isNaN(stock)) return alert("Completa los datos");

            const nuevoItem = { id: Date.now(), nombre, stock, costo };
            inventario.push(nuevoItem);
            
            db.ref('negocio/inventario').set(inventario);
            alert("Sincronizado!");
            document.getElementById('inv-nombre').value = "";
        }

        function procesarVenta() {
            const id = document.getElementById('venta-producto').value;
            const qty = parseInt(document.getElementById('venta-qty').value);
            const precio = parseFloat(document.getElementById('venta-precio').value);
            const tinta = parseFloat(document.getElementById('venta-tinta').value) || 0;
            const envio = parseFloat(document.getElementById('venta-envio').value) || 0;

            const p = inventario.find(x => x.id == id);
            if(!p || p.stock < qty) return alert("No hay stock suficiente");

            p.stock -= qty;
            const costoTotalMat = qty * p.costo;
            const ganancia = (qty * precio) - costoTotalMat - tinta - envio;

            fondos.costoProducto += costoTotalMat;
            fondos.costoLuzTinta += tinta;
            fondos.gananciaLibre += ganancia;

            db.ref('negocio').update({ inventario, fondos });
            alert("Venta registrada en todos tus dispositivos");
        }

        function resetFondo(tipo) {
            if(confirm("¿Retirar dinero de esta caja?")) {
                fondos[tipo] = 0;
                db.ref('negocio/fondos').set(fondos);
            }
        }

        function actualizarUI() {
            document.getElementById('dash-valor-inv').innerText = 'Q ' + inventario.reduce((s,p) => s+(p.stock*p.costo),0).toFixed(2);
            document.getElementById('dash-costo-producto').innerText = 'Q ' + fondos.costoProducto.toFixed(2);
            document.getElementById('dash-costo-luz').innerText = 'Q ' + fondos.costoLuzTinta.toFixed(2);
            document.getElementById('dash-ganancia').innerText = 'Q ' + fondos.gananciaLibre.toFixed(2);

            const cont = document.getElementById('lista-inventario');
            cont.innerHTML = "";
            inventario.forEach(p => {
                cont.innerHTML += `<div class="item-row">
                    <span><b>${p.nombre}</b> (Stock: ${p.stock})</span>
                    <button class="btn-delete" onclick="borrarProd(${p.id})">Eliminar</button>
                </div>`;
            });
        }

        function borrarProd(id) {
            if(confirm("¿Eliminar?")) {
                inventario = inventario.filter(x => x.id !== id);
                db.ref('negocio/inventario').set(inventario);
            }
        }

        function renderSelectVentas() {
            const s = document.getElementById('venta-producto');
            s.innerHTML = inventario.map(p => `<option value="${p.id}">${p.nombre} (${p.stock})</option>`).join('');
        }

        function generarReporteExcel() {
            const hoja = XLSX.utils.json_to_sheet(inventario);
            const libro = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(libro, hoja, "Inventario");
            XLSX.writeFile(libro, "SubliCosturas_Nube.xlsx");
        }
    </script>
</body>
</html>
